<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付成功 - Content Repurposer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1a1a2e; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; border-radius: 20px; padding: 60px 40px; text-align: center; max-width: 500px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .checkmark { width: 100px; height: 100px; background: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; font-size: 50px; color: white; }
        h1 { font-size: 32px; margin-bottom: 20px; }
        p { color: #666; font-size: 16px; line-height: 1.6; margin-bottom: 30px; }
        .btn { display: inline-block; background: #667eea; color: white; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 16px; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .info { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: left; }
        .info h3 { font-size: 14px; color: #333; margin-bottom: 10px; }
        .info li { font-size: 14px; color: #666; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark">✓</div>
        <h1>支付成功！</h1>
        <p>感谢您购买 Content Repurposer！您的 API Key 已发送到您的邮箱，请查收。</p>
        <a href="/docs" class="btn">查看 API 文档</a>
        <div class="info">
            <h3>下一步：</h3>
            <ul>
                <li>检查邮箱获取 API Key</li>
                <li>阅读 API 文档了解使用方法</li>
                <li>开始调用 /repurpose 端点转换内容</li>
            </ul>
        </div>
    </div>
</body>
</html>
